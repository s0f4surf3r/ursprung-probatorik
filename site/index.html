<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ursprung</title>
<style>
:root {
  --bg: #06090f;
  --surface: #0e1320;
  --card: #141d30;
  --border: #3e5080;
  --text: #f4f6ff;
  --text-muted: #c2cee8;
  --text-dim: #8098b8;
  --teal: #b8d0f8;
  --accent: #f0d068;
  --warm: #e8a878;
  --safe: #90c098;
  --btn-text: #0a0e1a;
  --selection: rgba(184,208,248,0.25);
}
:root.light {
  --bg: #e4e8f8;
  --surface: #ffffff;
  --card: #d8e0f4;
  --border: #8898cc;
  --text: #000000;
  --text-muted: #2c3450;
  --text-dim: #505c80;
  --teal: #2c4490;
  --accent: #c8a820;
  --warm: #c07030;
  --safe: #2a8040;
  --btn-text: #ffffff;
  --selection: rgba(44,68,144,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}
::selection { background: var(--selection); }

.app { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem; min-height: 100vh; }

/* Spacing Stufe 4 — emotionaler/narrativer Kontext (Wahrnehmungsgrammatik Prinzip 4) */

.header {
  text-align: center;
  padding: 3rem 0 2rem;
}
.header h1 {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 1rem;
}
.header p {
  color: var(--text-muted);
  font-size: 1rem;
  max-width: 480px;
  margin: 0 auto;
  white-space: pre-line;
}

.progress {
  display: flex;
  gap: 4px;
  margin: 2rem 0;
}
.progress-dot {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.4s;
}
.progress-dot.done { background: var(--teal); }
.progress-dot.active { background: var(--accent); }

.step { display: none; animation: fadeIn 0.5s ease; }
.step.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-tag {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
}
.step-question {
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 1rem;
}
.step-desc {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-bottom: 2.4rem;
  line-height: 1.75;
}

/* Textarea */
.textarea-wrap { margin-bottom: 2.4rem; }
textarea {
  width: 100%;
  min-height: 140px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem 1.4rem;
  font-family: inherit;
  font-size: 1rem;
  color: var(--text);
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  -webkit-font-smoothing: antialiased;
}
textarea:focus { border-color: var(--teal); }
textarea::placeholder { color: var(--text-dim); font-style: italic; }
textarea.small { min-height: 80px; }
.textarea-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
  display: block;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.4rem; }
.option {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 1.1rem 1.3rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: inherit;
  font-size: 1rem;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
}
.option:hover { border-color: var(--teal); }
.option.selected { border-color: var(--teal); background: var(--selection); }
.option-radio {
  width: 20px; height: 20px; min-width: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.options.multi .option-radio { border-radius: 5px; }
.option.selected .option-radio { border-color: var(--teal); }
.option.selected .option-radio::after {
  content: '';
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--teal);
}
.options.multi .option.selected .option-radio::after {
  border-radius: 2px;
}
.option-text strong { display: block; margin-bottom: 0.2rem; }
.option-text small { color: var(--text-dim); font-size: 0.85rem; }

/* Hint box */
.hint {
  background: rgba(240,208,104,0.08);
  border: 1px solid rgba(240,208,104,0.15);
  border-radius: 10px;
  padding: 1.2rem 1.4rem;
  margin-bottom: 2.4rem;
  font-size: 0.9rem;
  color: var(--accent);
  line-height: 1.7;
}
.hint strong { display: block; margin-bottom: 0.3rem; }
:root.light .hint {
  color: #5a4500;
  background: rgba(160,120,0,0.08);
  border-color: rgba(160,120,0,0.22);
}

/* Buttons */
.btn-row { display: flex; gap: 0.8rem; margin-top: 2rem; }
.btn {
  flex: 1;
  padding: 0.9rem 1.5rem;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { border-color: var(--text-muted); color: var(--text); }
.btn-primary {
  background: var(--teal);
  border-color: var(--teal);
  color: var(--btn-text);
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

/* Result */
.result { display: none; }
.result.active { display: block; }
.result-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1.2rem;
}
.result-section h3 {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 0.8rem;
}
.result-text {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
}
.result-text em { color: var(--text); font-style: normal; font-weight: 600; }
.result-empty { color: var(--text-dim); font-size: 0.85rem; font-style: italic; }

.result-pattern {
  margin-bottom: 1rem;
}
.result-pattern-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.result-pattern-desc {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.8;
}

.result-summary {
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1.2rem;
}
.result-summary h3 {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.8rem;
}
.result-summary p {
  color: var(--text);
  font-size: 1rem;
  line-height: 1.8;
}

.result-closing {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text-muted);
  font-size: 1rem;
  line-height: 1.8;
  font-style: italic;
}

.result-bridge {
  background: color-mix(in srgb, var(--safe) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--safe) 20%, transparent);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1.2rem;
}
.result-bridge h3 {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--safe);
  margin-bottom: 0.8rem;
}
.result-bridge p {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.8;
  margin-bottom: 1rem;
}
.result-bridge .btn-bridge {
  display: inline-block;
  padding: 0.7rem 1.5rem;
  border-radius: 10px;
  border: 1.5px solid var(--safe);
  background: transparent;
  color: var(--safe);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.result-bridge .btn-bridge:hover { background: color-mix(in srgb, var(--safe) 15%, transparent); }

.result-actions {
  display: flex;
  gap: 0.8rem;
  margin-top: 2rem;
  padding-bottom: 3rem;
}
.copy-feedback {
  text-align: center;
  font-size: 0.85rem;
  color: var(--safe);
  margin-top: 0.5rem;
  height: 1.2em;
  transition: opacity 0.3s;
}

/* Top controls */
.top-controls {
  position: fixed;
  top: 1.2rem;
  right: 1.2rem;
  display: flex;
  gap: 0.5rem;
  z-index: 100;
}
.top-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  transition: all 0.3s;
}
.top-btn:hover { border-color: var(--teal); color: var(--text); }
.lang-toggle { font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
:root.light .theme-toggle .icon-sun { display: block; }
:root.light .theme-toggle .icon-moon { display: none; }

.foot {
  text-align: center;
  padding: 1rem 0 2rem;
  font-size: 0.72rem;
  color: var(--text-dim);
}
</style>
</head>

function t(key) { return i18n[lang][key] || i18n.de[key] || key; }

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('langBtn').textContent = lang === 'de' ? 'EN' : 'DE';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  if (document.getElementById('result').classList.contains('active')) {
    generateResult();
  }
}

function toggleLang() {
  lang = lang === 'de' ? 'en' : 'de';
  localStorage.setItem('ursprung-lang', lang);
  applyLang();
}

// ==================== App Logic ====================
const TOTAL_STEPS = 6;
let current = 1;
const answers = { elternwelt: [], freude: [] };

// Progress dots
const progEl = document.getElementById('progress');
for (let i = 1; i <= TOTAL_STEPS; i++) {
  const d = document.createElement('div');
  d.className = 'progress-dot' + (i === 1 ? ' active' : '');
  d.dataset.step = i;
  progEl.appendChild(d);
}

// Option click handlers
document.querySelectorAll('.options').forEach(group => {
  const isMulti = group.classList.contains('multi');
  group.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      const key = group.dataset.key;
      const val = opt.dataset.value;
      if (isMulti) {
        opt.classList.toggle('selected');
        if (!answers[key]) answers[key] = [];
        if (opt.classList.contains('selected')) {
          if (!answers[key].includes(val)) answers[key].push(val);
        } else {
          answers[key] = answers[key].filter(v => v !== val);
        }
      } else {
        group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        answers[key] = val;
        // Enable result button in step 6
        const btnRes = document.getElementById('btnResult');
        if (btnRes && current === TOTAL_STEPS) btnRes.disabled = false;
      }
    });
  });
});

// Enter key in textareas triggers next/result
document.querySelectorAll('textarea').forEach(ta => {
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (current === TOTAL_STEPS) {
        const btn = document.getElementById('btnResult');
        if (btn && !btn.disabled) showResult();
      } else {
        nextStep();
      }
    }
  });
});

function updateProgress() {
  progEl.querySelectorAll('.progress-dot').forEach(d => {
    const s = parseInt(d.dataset.step);
    d.className = 'progress-dot' + (s < current ? ' done' : '') + (s === current ? ' active' : '');
  });
}

function nextStep() {
  collectTextareas();
  document.getElementById('step-' + current).classList.remove('active');
  current++;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStep() {
  collectTextareas();
  document.getElementById('step-' + current).classList.remove('active');
  current--;
  document.getElementById('step-' + current).classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function collectTextareas() {
  const map = {
    ta_elternwelt: 'elternwelt_text',
    ta_platz: 'platz_text',
    ta_heute: 'heute_text'
  };
  Object.entries(map).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) answers[key] = el.value.trim();
  });
}

function showResult() {
  collectTextareas();
  document.getElementById('step-' + current).classList.remove('active');
  progEl.querySelectorAll('.progress-dot').forEach(d => d.className = 'progress-dot done');
  const result = document.getElementById('result');
  result.classList.add('active');
  generateResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== Pattern Detection ====================
function detectPattern() {
  // Score: A = Boden, B = Strömung, C = Nebel
  let a = 0, b = 0, c = 0;

  // Step 1 — Ankunft
  const ankunft = answers.ankunft;
  if (ankunft === 'stolz') a += 3;
  else if (ankunft === 'sachlich') b += 2;
  else if (ankunft === 'selten') c += 3;
  else if (ankunft === 'widerspruch') b += 3;
  else if (ankunft === 'unbekannt') c += 3;

  // Step 2 — Elternwelt
  const ew = answers.elternwelt || [];
  if (ew.includes('stabil')) a += 3;
  if (ew.includes('fassade')) b += 3;
  if (ew.includes('frisch')) b += 2;
  if (ew.includes('krise')) b += 3;
  if (ew.includes('jung')) b += 2;
  if (ew.includes('auseinander')) b += 3;
  if (ew.includes('weissnicht')) c += 3;
  if (ew.includes('erforschen')) c += 2;

  // Step 3 — Freude
  const fr = answers.freude || [];
  if (fr.includes('beide')) a += 3;
  if (fr.includes('einseitig')) b += 2;
  if (fr.includes('grosseltern')) b += 1;
  if (fr.includes('funktioniert')) c += 2;
  if (fr.includes('dagegen')) b += 3;
  if (fr.includes('nie_erzaehlt')) c += 3;
  if (fr.includes('erforschen')) c += 2;

  // Step 4 — Platz
  const platz = answers.platz;
  if (platz === 'ja') a += 3;
  else if (platz === 'meistens') { a += 1; b += 1; }
  else if (platz === 'verdienen') b += 3;
  else if (platz === 'zuviel') b += 3;
  else if (platz === 'unsichtbar') c += 3;

  // Step 5 — Frage
  const frage = answers.frage;
  if (frage === 'nie') a += 3;
  else if (frage === 'kind') { a += 1; b += 1; }
  else if (frage === 'jugend') b += 2;
  else if (frage === 'erwachsen') b += 2;
  else if (frage === 'begleitet') b += 3;
  else if (frage === 'erstesmal') c += 2;

  // Step 6 — Heute
  const heute = answers.heute;
  if (heute === 'dankbarkeit') a += 2;
  else if (heute === 'neutral') { b += 1; c += 1; }
  else if (heute === 'trauer') b += 2;
  else if (heute === 'wut') b += 2;
  else if (heute === 'nichts') c += 3;
  else if (heute === 'zuviel') { b += 1; c += 1; }

  // Determine pattern — bei Gleichstand: vulnerableres Muster
  if (c >= b && c >= a) return 'nebel';
  if (b >= a) return 'stroemung';
  return 'boden';
}

// ==================== Result Generation ====================
function generateResult() {
  const pattern = detectPattern();
  let html = '';

  // Reflected answers — Step 1
  const ankunftLabels = {
    stolz: 's1_o1', sachlich: 's1_o2', selten: 's1_o3',
    widerspruch: 's1_o4', unbekannt: 's1_o5'
  };
  html += section(t('r_h_ankunft'),
    answers.ankunft
      ? `<div class="result-text"><em>${t(ankunftLabels[answers.ankunft])}</em></div>`
      : `<div class="result-empty">${t('r_empty')}</div>`
  );

  // Step 2 — Elternwelt
  const ew = answers.elternwelt || [];
  const ewLabels = { stabil:'s2_o1', fassade:'s2_o1b', frisch:'s2_o2', krise:'s2_o3', jung:'s2_o4', auseinander:'s2_o5', weissnicht:'s2_o6', erforschen:'s2_o7' };
  let ewHtml = '';
  if (ew.length > 0) {
    ewHtml += ew.map(v => `<em>${t(ewLabels[v])}</em>`).join(', ');
    ewHtml = `<div class="result-text">${ewHtml}</div>`;
  }
  if (answers.elternwelt_text) {
    ewHtml += `<div class="result-text" style="margin-top:0.5rem">${esc(answers.elternwelt_text)}</div>`;
  }
  if (!ewHtml) ewHtml = `<div class="result-empty">${t('r_empty')}</div>`;
  html += section(t('r_h_elternwelt'), ewHtml);

  // Step 3 — Freude
  const fr = answers.freude || [];
  const frLabels = { beide:'s3_o1', einseitig:'s3_o2', grosseltern:'s3_o3', funktioniert:'s3_o4', dagegen:'s3_o5', nie_erzaehlt:'s3_o6', erforschen:'s3_o7' };
  let frHtml = '';
  if (fr.length > 0) {
    frHtml = `<div class="result-text">${fr.map(v => `<em>${t(frLabels[v])}</em>`).join(', ')}</div>`;
  }
  if (!frHtml) frHtml = `<div class="result-empty">${t('r_empty')}</div>`;
  html += section(t('r_h_freude'), frHtml);

  // Step 4 — Platz
  const platzLabels = { ja:'s4_o1', meistens:'s4_o2', verdienen:'s4_o3', zuviel:'s4_o4', unsichtbar:'s4_o5' };
  let platzHtml = '';
  if (answers.platz) {
    platzHtml = `<div class="result-text"><em>${t(platzLabels[answers.platz])}</em></div>`;
  }
  if (answers.platz_text) {
    platzHtml += `<div class="result-text" style="margin-top:0.5rem">${esc(answers.platz_text)}</div>`;
  }
  if (!platzHtml) platzHtml = `<div class="result-empty">${t('r_empty')}</div>`;
  html += section(t('r_h_platz'), platzHtml);

  // Step 5 — Frage
  const frageLabels = { nie:'s5_o1', kind:'s5_o2', jugend:'s5_o3', erwachsen:'s5_o4', begleitet:'s5_o5', erstesmal:'s5_o6' };
  html += section(t('r_h_frage'),
    answers.frage
      ? `<div class="result-text"><em>${t(frageLabels[answers.frage])}</em></div>`
      : `<div class="result-empty">${t('r_empty')}</div>`
  );

  // Step 6 — Heute
  const heuteLabels = { dankbarkeit:'s6_o1', neutral:'s6_o2', trauer:'s6_o3', wut:'s6_o4', nichts:'s6_o5', zuviel:'s6_o6' };
  let heuteHtml = '';
  if (answers.heute) {
    heuteHtml = `<div class="result-text"><em>${t(heuteLabels[answers.heute])}</em></div>`;
  }
  if (answers.heute_text) {
    heuteHtml += `<div class="result-text" style="margin-top:0.5rem">${esc(answers.heute_text)}</div>`;
  }
  if (!heuteHtml) heuteHtml = `<div class="result-empty">${t('r_empty')}</div>`;
  html += section(t('r_h_heute'), heuteHtml);

  // Pattern
  const patternName = t('pattern_' + pattern + '_name');
  const patternDesc = t('pattern_' + pattern + '_desc');
  html += `<div class="result-section">
    <h3>${t('r_h_muster')}</h3>
    <div class="result-pattern">
      <div class="result-pattern-name">${patternName}</div>
      <div class="result-pattern-desc">${patternDesc.replace(/\n/g, '<br>')}</div>
    </div>
  </div>`;

  // Question to take
  const qKey = 'q_' + pattern;
  html += `<div class="result-summary">
    <h3>${t('r_h_frage_mitnehmen')}</h3>
    <p>${t(qKey)}</p>
  </div>`;

  // Coaching bridge — if person has unknowns/explore answers
  const hasExplore = ew.includes('erforschen') || fr.includes('erforschen')
    || ew.includes('weissnicht') || fr.includes('nie_erzaehlt')
    || answers.ankunft === 'unbekannt' || answers.ankunft === 'selten'
    || answers.frage === 'erstesmal' || answers.frage === 'begleitet'
    || answers.heute === 'zuviel';

  if (hasExplore) {
    html += `<div class="result-bridge">
      <h3>${t('r_h_bridge')}</h3>
      <p>${t('bridge_text')}</p>
      <a class="btn-bridge" href="mailto:jochen.hornung@me.com?subject=${encodeURIComponent(t('export_head') + ' \u2014 ' + t('r_h_bridge'))}">${t('bridge_cta')}</a>
    </div>`;
  }

  // Closing
  html += `<div class="result-closing">${t('closing')}</div>`;

  document.getElementById('resultContent').innerHTML = html;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function section(heading, content) {
  return `<div class="result-section"><h3>${heading}</h3>${content}</div>`;
}

// ==================== Export ====================
function buildExportText() {
  const pattern = detectPattern();
  const ankunftLabels = { stolz:'s1_o1', sachlich:'s1_o2', selten:'s1_o3', widerspruch:'s1_o4', unbekannt:'s1_o5' };
  const ewLabels = { stabil:'s2_o1', fassade:'s2_o1b', frisch:'s2_o2', krise:'s2_o3', jung:'s2_o4', auseinander:'s2_o5', weissnicht:'s2_o6', erforschen:'s2_o7' };
  const frLabels = { beide:'s3_o1', einseitig:'s3_o2', grosseltern:'s3_o3', funktioniert:'s3_o4', dagegen:'s3_o5', nie_erzaehlt:'s3_o6', erforschen:'s3_o7' };
  const platzLabels = { ja:'s4_o1', meistens:'s4_o2', verdienen:'s4_o3', zuviel:'s4_o4', unsichtbar:'s4_o5' };
  const frageLabels = { nie:'s5_o1', kind:'s5_o2', jugend:'s5_o3', erwachsen:'s5_o4', begleitet:'s5_o5', erstesmal:'s5_o6' };
  const heuteLabels = { dankbarkeit:'s6_o1', neutral:'s6_o2', trauer:'s6_o3', wut:'s6_o4', nichts:'s6_o5', zuviel:'s6_o6' };

  let text = t('export_head') + '\n';
  text += '\u2501'.repeat(32) + '\n\n';

  text += t('r_h_ankunft').toUpperCase() + '\n';
  text += (answers.ankunft ? t(ankunftLabels[answers.ankunft]) : t('r_empty')) + '\n\n';

  text += t('r_h_elternwelt').toUpperCase() + '\n';
  const ew = answers.elternwelt || [];
  if (ew.length > 0) ew.forEach(v => { text += '\u00b7 ' + t(ewLabels[v]) + '\n'; });
  if (answers.elternwelt_text) text += answers.elternwelt_text + '\n';
  if (ew.length === 0 && !answers.elternwelt_text) text += t('r_empty') + '\n';
  text += '\n';

  text += t('r_h_freude').toUpperCase() + '\n';
  const fr = answers.freude || [];
  if (fr.length > 0) fr.forEach(v => { text += '\u00b7 ' + t(frLabels[v]) + '\n'; });
  else text += t('r_empty') + '\n';
  text += '\n';

  text += t('r_h_platz').toUpperCase() + '\n';
  text += (answers.platz ? t(platzLabels[answers.platz]) : t('r_empty')) + '\n';
  if (answers.platz_text) text += answers.platz_text + '\n';
  text += '\n';

  text += t('r_h_frage').toUpperCase() + '\n';
  text += (answers.frage ? t(frageLabels[answers.frage]) : t('r_empty')) + '\n\n';

  text += t('r_h_heute').toUpperCase() + '\n';
  text += (answers.heute ? t(heuteLabels[answers.heute]) : t('r_empty')) + '\n';
  if (answers.heute_text) text += answers.heute_text + '\n';
  text += '\n';

  text += t('r_h_muster').toUpperCase() + '\n';
  text += t('pattern_' + pattern + '_name') + '\n';
  text += t('pattern_' + pattern + '_desc') + '\n\n';

  text += t('r_h_frage_mitnehmen').toUpperCase() + '\n';
  text += t('q_' + pattern) + '\n\n';

  text += t('closing') + '\n';

  return text;
}

function sendResult() {
  const text = buildExportText();
  const subject = encodeURIComponent(t('export_head'));
  const body = encodeURIComponent(text);
  window.location.href = 'mailto:jochen.hornung@me.com?subject=' + subject + '&body=' + body;
}

function copyResult() {
  const text = buildExportText();
  navigator.clipboard.writeText(text).then(() => {
    const fb = document.getElementById('copyFeedback');
    fb.textContent = t('r_copy_ok');
    setTimeout(() => { fb.textContent = ''; }, 3000);
  });
}

function restartAll() {
  Object.keys(answers).forEach(k => {
    if (k === 'elternwelt' || k === 'freude') answers[k] = [];
    else answers[k] = '';
  });
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('textarea').forEach(ta => { ta.value = ''; });
  document.getElementById('btnResult').disabled = true;
  document.getElementById('result').classList.remove('active');
  current = 1;
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-1').classList.add('active');
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== Theme ====================
function toggleTheme() {
  document.documentElement.classList.toggle('light');
  localStorage.setItem('ursprung-theme',
    document.documentElement.classList.contains('light') ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('ursprung-theme');
if (savedTheme === 'light') {
  document.documentElement.classList.add('light');
} else if (!savedTheme) {
  const hour = new Date().getHours();
  if (hour >= 7 && hour < 19) document.documentElement.classList.add('light');
}

// ==================== Init ====================
document.getElementById('step-1').classList.add('active');
applyLang();
</script>
